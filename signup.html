<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — AI Guardrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dreamcore pastel holographic palette */
      --pink: #ffb8d0;
      --pink-soft: rgba(255, 184, 208, 0.15);
      --blue: #a8d8ff;
      --blue-soft: rgba(168, 216, 255, 0.15);
      --lavender: #c4b5ff;
      --lavender-soft: rgba(196, 181, 255, 0.15);
      --cyan: #a0f0e8;
      --cyan-soft: rgba(160, 240, 232, 0.15);
      --peach: #ffd4b8;
      --yellow: #fff4a8;
      --cobalt: #2d3a8c;
      --cobalt-soft: rgba(45, 58, 140, 0.08);

      /* Surface materials */
      --glass-bg: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-highlight: rgba(255, 255, 255, 0.6);
      --jelly-bg: rgba(255, 184, 208, 0.2);
      --jelly-border: rgba(255, 184, 208, 0.35);

      /* Text */
      --ink: #1a1a3e;
      --ink-secondary: #4a4a6e;
      --ink-muted: #7a7a9e;
      --ink-light: #a0a0c0;

      /* Radii */
      --radius-sm: 20px;
      --radius-md: 28px;
      --radius-lg: 40px;
      --radius-full: 9999px;

      /* Space */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-8: 32px;
      --s-10: 40px;
      --s-12: 48px;
      --s-16: 64px;
      --s-20: 80px;
      --s-24: 96px;
      --s-32: 128px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #f0f4ff 0%, #fff0f5 25%, #f5f0ff 50%, #e8f8f5 75%, #fff8f0 100%);
      background-attachment: fixed;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== AURORA BACKGROUND ===== */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .aurora-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }

    .aurora-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
      top: 20%; right: -15%;
      animation-delay: -7s;
    }

    .aurora-orb-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, var(--lavender) 0%, transparent 70%);
      bottom: 10%; left: 20%;
      animation-delay: -14s;
    }

    .aurora-orb-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
      bottom: -5%; right: 30%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 10px) scale(1.02); }
    }

    /* ===== GLASS NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: var(--s-4) var(--s-6);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--s-3) var(--s-5);
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.15), inset 0 1px 0 var(--glass-highlight);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo-blob {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      border-radius: 50% 40% 60% 50% / 60% 50% 40% 60%;
      position: relative;
      animation: blob-morph 8s ease-in-out infinite;
      box-shadow: 0 4px 16px rgba(196, 181, 255, 0.4), inset 0 -2px 8px rgba(255, 255, 255, 0.3);
    }

    @keyframes blob-morph {
      0%, 100% { border-radius: 50% 40% 60% 50% / 60% 50% 40% 60%; }
      33% { border-radius: 40% 60% 50% 60% / 50% 60% 50% 40%; }
      66% { border-radius: 60% 50% 40% 50% / 40% 50% 60% 50%; }
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: var(--s-8);
    }

    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-secondary);
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-links a:hover {
      color: var(--cobalt);
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 50%;
      width: 0; height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--lavender));
      border-radius: 2px;
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    /* ===== JELLY BUTTON ===== */
    .jelly-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-2);
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      border: none;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .jelly-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    .jelly-btn-primary {
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      color: var(--cobalt);
      box-shadow: 0 4px 20px rgba(196, 181, 255, 0.4), 0 2px 8px rgba(255, 184, 208, 0.3), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .jelly-btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(196, 181, 255, 0.5), 0 4px 16px rgba(255, 184, 208, 0.4), inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .jelly-btn-primary:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 2px 8px rgba(196, 181, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .jelly-btn-secondary {
      background: var(--glass-bg);
      color: var(--ink-secondary);
      border: 1px solid var(--glass-border);
      box-shadow: 0 2px 12px rgba(168, 216, 255, 0.1), inset 0 1px 0 var(--glass-highlight);
    }

    .jelly-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(168, 216, 255, 0.2), inset 0 1px 0 var(--glass-highlight);
    }

    /* ===== SIGNUP PAGE ===== */
    .signup-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-32) var(--s-6) var(--s-20);
    }

    .signup-container {
      width: 100%;
      max-width: 480px;
      position: relative;
    }

    /* Decorative blobs behind form */
    .signup-blobs {
      position: absolute;
      inset: -60px -80px -60px -80px;
      pointer-events: none;
      z-index: 0;
    }

    .signup-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      animation: blob-bounce 6s ease-in-out infinite;
    }

    .signup-blob-1 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
      top: -40px; left: -60px;
      animation-delay: 0s;
    }

    .signup-blob-2 {
      width: 180px; height: 180px;
      background: radial-gradient(circle, var(--lavender) 0%, transparent 70%);
      top: 20%; right: -50px;
      animation-delay: -2s;
    }

    .signup-blob-3 {
      width: 160px; height: 160px;
      background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
      bottom: 10%; left: -40px;
      animation-delay: -4s;
    }

    .signup-blob-4 {
      width: 140px; height: 140px;
      background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
      bottom: -30px; right: 20%;
      animation-delay: -1s;
    }

    @keyframes blob-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-15px) scale(1.05); }
    }

    /* Glassmorphism form card */
    .signup-card {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--s-10) var(--s-8);
      box-shadow: 0 20px 60px rgba(196, 181, 255, 0.2), 0 8px 24px rgba(168, 216, 255, 0.15), inset 0 1px 0 var(--glass-highlight);
      overflow: hidden;
    }

    /* Rainbow rim light at top */
    .signup-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--blue), var(--cyan));
      opacity: 0.6;
    }

    /* Subsurface highlight */
    .signup-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      pointer-events: none;
      border-radius: inherit;
    }

    .signup-header {
      text-align: center;
      margin-bottom: var(--s-8);
      position: relative;
      z-index: 1;
    }

    .signup-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: var(--s-2);
      padding: 8px 16px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--cobalt);
      margin-bottom: var(--s-5);
      box-shadow: inset 0 1px 0 var(--glass-highlight);
    }

    .signup-eyebrow .pulse {
      width: 8px; height: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border-radius: 50%;
      animation: pulse-glow 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--cyan);
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.8); }
    }

    .signup-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin: 0 0 var(--s-3);
    }

    .signup-subtitle {
      font-size: 15px;
      color: var(--ink-secondary);
      line-height: 1.6;
    }

    /* ===== FORM INPUTS ===== */
    .form-group {
      margin-bottom: var(--s-5);
      position: relative;
      z-index: 1;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-secondary);
      margin-bottom: var(--s-2);
      letter-spacing: 0.02em;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: var(--ink);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      outline: none;
    }

    .form-input::placeholder {
      color: var(--ink-light);
      font-weight: 400;
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(196, 181, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(196, 181, 255, 0.25), 0 4px 16px rgba(168, 216, 255, 0.15);
    }

    .form-input:hover:not(:focus) {
      background: rgba(255, 255, 255, 0.4);
      border-color: rgba(255, 255, 255, 0.5);
    }

    /* Password strength indicator */
    .password-strength {
      margin-top: var(--s-2);
      display: flex;
      align-items: center;
      gap: var(--s-2);
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      overflow: hidden;
    }

    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: all 0.3s ease;
    }

    .strength-text {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
    }

    /* Terms checkbox */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: var(--s-3);
      margin-bottom: var(--s-6);
      position: relative;
      z-index: 1;
    }

    .terms-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      min-width: 20px;
      min-height: 20px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      margin-top: 1px;
    }

    .terms-checkbox:hover {
      background: rgba(255, 255, 255, 0.5);
      border-color: rgba(196, 181, 255, 0.5);
    }

    .terms-checkbox:checked {
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      border-color: transparent;
    }

    .terms-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 4px; left: 7px;
      width: 5px; height: 9px;
      border: solid var(--cobalt);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .terms-label {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-secondary);
      line-height: 1.5;
    }

    .terms-label a {
      color: var(--cobalt);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
    }

    .terms-label a::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 1px;
      background: linear-gradient(90deg, var(--pink), var(--lavender));
      transition: width 0.3s ease;
    }

    .terms-label a:hover {
      color: var(--lavender);
    }

    .terms-label a:hover::after {
      width: 100%;
    }

    /* Submit button */
    .signup-submit {
      width: 100%;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    /* Divider */
    .signup-divider {
      display: flex;
      align-items: center;
      gap: var(--s-4);
      margin: var(--s-6) 0;
      position: relative;
      z-index: 1;
    }

    .signup-divider::before,
    .signup-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
    }

    .signup-divider span {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Social signup buttons */
    .social-buttons {
      display: flex;
      gap: var(--s-3);
      position: relative;
      z-index: 1;
    }

    .social-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-2);
      padding: 12px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-secondary);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      font-family: inherit;
    }

    .social-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(168, 216, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .social-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* Sign in link */
    .signup-footer {
      text-align: center;
      margin-top: var(--s-6);
      position: relative;
      z-index: 1;
    }

    .signup-footer p {
      font-size: 14px;
      color: var(--ink-secondary);
    }

    .signup-footer a {
      color: var(--cobalt);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
    }

    .signup-footer a::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0;
      width: 0; height: 1px;
      background: linear-gradient(90deg, var(--pink), var(--lavender));
      transition: width 0.3s ease;
    }

    .signup-footer a:hover {
      color: var(--lavender);
    }

    .signup-footer a:hover::after {
      width: 100%;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: relative;
      z-index: 1;
      padding: var(--s-8) var(--s-6);
      text-align: center;
    }

    .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--s-6) var(--s-5);
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: inset 0 1px 0 var(--glass-highlight);
    }

    .footer p {
      font-size: 13px;
      color: var(--ink-muted);
    }

    .footer a {
      color: var(--ink-secondary);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: var(--cobalt);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 640px) {
      .signup-page {
        padding: calc(var(--s-32) + var(--s-6)) var(--s-4) var(--s-12);
      }

      .signup-card {
        padding: var(--s-8) var(--s-5);
        border-radius: var(--radius-md);
      }

      .signup-blobs {
        inset: -40px -40px -40px -40px;
      }

      .signup-blob {
        opacity: 0.25;
      }

      .nav-links {
        display: none;
      }

      .social-buttons {
        flex-direction: column;
      }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      .aurora-orb,
      .signup-blob,
      .logo-blob {
        animation: none;
      }

      .jelly-btn,
      .form-input,
      .social-btn,
      .signup-card {
        transition: none;
      }
    }
  </style>
</head>
<body>

  <!-- Aurora Background -->
  <div class="aurora">
    <div class="aurora-orb aurora-orb-1"></div>
    <div class="aurora-orb aurora-orb-2"></div>
    <div class="aurora-orb aurora-orb-3"></div>
    <div class="aurora-orb aurora-orb-4"></div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="landing.html" class="logo">
        <div class="logo-blob"></div>
        AI Guardrail
      </a>
      <div class="nav-links">
        <a href="landing.html">Home</a>
        <a href="pricing.html">Pricing</a>
        <a href="signin.html" class="jelly-btn jelly-btn-secondary">Sign in</a>
      </div>
    </div>
  </nav>

  <!-- Sign Up Page -->
  <main class="signup-page">
    <div class="signup-container">
      <!-- Decorative blobs behind form -->
      <div class="signup-blobs">
        <div class="signup-blob signup-blob-1"></div>
        <div class="signup-blob signup-blob-2"></div>
        <div class="signup-blob signup-blob-3"></div>
        <div class="signup-blob signup-blob-4"></div>
      </div>

      <!-- Glassmorphism form card -->
      <div class="signup-card">
        <div class="signup-header">
          <div class="signup-eyebrow">
            <span class="pulse"></span>
            Get Started Free
          </div>
          <h1 class="signup-title">Create your account</h1>
          <p class="signup-subtitle">Join thousands of teams building safer AI experiences</p>
        </div>

        <form action="#" method="POST">
          <!-- Email -->
          <div class="form-group">
            <label class="form-label" for="email">Work email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="you@company.com"
              required
              autocomplete="email"
            >
          </div>

          <!-- Company Name -->
          <div class="form-group">
            <label class="form-label" for="company">Company name</label>
            <input
              type="text"
              id="company"
              name="company"
              class="form-input"
              placeholder="Acme Inc."
              required
              autocomplete="organization"
            >
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Create a strong password"
              required
              autocomplete="new-password"
              minlength="8"
            >
            <div class="password-strength">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span class="strength-text" id="strengthText">Enter password</span>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label" for="confirm-password">Confirm password</label>
            <input
              type="password"
              id="confirm-password"
              name="confirm_password"
              class="form-input"
              placeholder="Repeat your password"
              required
              autocomplete="new-password"
              minlength="8"
            >
          </div>

          <!-- Terms Checkbox -->
          <div class="terms-group">
            <input
              type="checkbox"
              id="terms"
              name="terms"
              class="terms-checkbox"
              required
            >
            <label class="terms-label" for="terms">
              I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>, and consent to receiving product updates and security alerts.
            </label>
          </div>

          <!-- Submit -->
          <button type="submit" class="jelly-btn jelly-btn-primary signup-submit">
            Create Account
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/>
              <path d="m12 5 7 7-7 7"/>
            </svg>
          </button>
        </form>

        <!-- Divider -->
        <div class="signup-divider">
          <span>or sign up with</span>
        </div>

        <!-- Social buttons -->
        <div class="social-buttons">
          <button type="button" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Google
          </button>
          <button type="button" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
            </svg>
            GitHub
          </button>
        </div>

        <!-- Sign in link -->
        <div class="signup-footer">
          <p>Already have an account? <a href="signin.html">Sign in</a></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <p>By signing up, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>. Protected by enterprise-grade encryption.</p>
    </div>
  </footer>

  <!-- Password strength script -->
  <script>
    (function() {
      const password = document.getElementById('password');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      function getStrength(value) {
        let score = 0;
        if (value.length >= 8) score++;
        if (value.length >= 12) score++;
        if (/[A-Z]/.test(value)) score++;
        if (/[0-9]/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;
        return Math.min(score, 4);
      }

      password.addEventListener('input', function() {
        const score = getStrength(this.value);
        const colors = [
          'transparent',
          'linear-gradient(90deg, #ffb8d0, #ffd4b8)',
          'linear-gradient(90deg, #ffd4b8, #fff4a8)',
          'linear-gradient(90deg, #a0f0e8, #a8d8ff)',
          'linear-gradient(90deg, #a8d8ff, #c4b5ff)'
        ];
        const labels = ['Enter password', 'Weak', 'Fair', 'Good', 'Strong'];
        const widths = ['0%', '25%', '50%', '75%', '100%'];

        strengthFill.style.width = widths[score];
        strengthFill.style.background = colors[score];
        strengthText.textContent = labels[score];
        strengthText.style.color = score === 0 ? '#a0a0c0' : (score < 2 ? '#7a7a9e' : '#4a4a6e');
      });
    })();
  </script>

</body>
