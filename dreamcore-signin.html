<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — AI Guardrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dreamcore pastel holographic palette */
      --pink: #ffb8d0;
      --pink-soft: rgba(255, 184, 208, 0.15);
      --blue: #a8d8ff;
      --blue-soft: rgba(168, 216, 255, 0.15);
      --lavender: #c4b5ff;
      --lavender-soft: rgba(196, 181, 255, 0.15);
      --cyan: #a0f0e8;
      --cyan-soft: rgba(160, 240, 232, 0.15);
      --peach: #ffd4b8;
      --yellow: #fff4a8;
      --cobalt: #2d3a8c;
      --cobalt-soft: rgba(45, 58, 140, 0.08);

      /* Surface materials */
      --glass-bg: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-highlight: rgba(255, 255, 255, 0.6);
      --jelly-bg: rgba(255, 184, 208, 0.2);
      --jelly-border: rgba(255, 184, 208, 0.35);

      /* Text */
      --ink: #1a1a3e;
      --ink-secondary: #4a4a6e;
      --ink-muted: #7a7a9e;
      --ink-light: #a0a0c0;

      /* Radii */
      --radius-sm: 20px;
      --radius-md: 28px;
      --radius-lg: 40px;
      --radius-full: 9999px;

      /* Space */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-8: 32px;
      --s-10: 40px;
      --s-12: 48px;
      --s-16: 64px;
      --s-20: 80px;
      --s-24: 96px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #f0f4ff 0%, #fff0f5 25%, #f5f0ff 50%, #e8f8f5 75%, #fff8f0 100%);
      background-attachment: fixed;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== AURORA BACKGROUND ===== */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .aurora-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }

    .aurora-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
      top: 20%; right: -15%;
      animation-delay: -7s;
    }

    .aurora-orb-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, var(--lavender) 0%, transparent 70%);
      bottom: 10%; left: 20%;
      animation-delay: -14s;
    }

    .aurora-orb-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
      bottom: -5%; right: 30%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 10px) scale(1.02); }
    }

    /* ===== BLOB DECORATIONS ===== */
    .blob-decoration {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      animation: blob-bounce 3s ease-in-out infinite;
    }

    .blob-decoration::after {
      content: '';
      position: absolute;
      top: 15%; left: 20%;
      width: 25%; height: 15%;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      filter: blur(2px);
    }

    .blob-1 {
      width: 120px; height: 120px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--peach) 100%);
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(255, 184, 208, 0.5), inset 0 -4px 12px rgba(255, 255, 255, 0.3);
      top: 15%; left: 8%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.5), inset 0 -4px 12px rgba(255, 255, 255, 0.3);
      top: 60%; right: 10%;
      animation-delay: -1s;
    }

    .blob-3 {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--lavender) 0%, var(--pink) 100%);
      border-radius: 50%;
      box-shadow: 0 8px 32px rgba(196, 181, 255, 0.5), inset 0 -4px 12px rgba(255, 255, 255, 0.3);
      bottom: 20%; left: 12%;
      animation-delay: -2s;
    }

    @keyframes blob-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    /* ===== GLASS NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: var(--s-4) var(--s-6);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--s-3) var(--s-5);
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.15), inset 0 1px 0 var(--glass-highlight);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo-blob {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      border-radius: 50% 40% 60% 50% / 60% 50% 40% 60%;
      position: relative;
      animation: blob-morph 8s ease-in-out infinite;
      box-shadow: 0 4px 16px rgba(196, 181, 255, 0.4), inset 0 -2px 8px rgba(255, 255, 255, 0.3);
    }

    @keyframes blob-morph {
      0%, 100% { border-radius: 50% 40% 60% 50% / 60% 50% 40% 60%; }
      33% { border-radius: 40% 60% 50% 60% / 50% 60% 50% 40%; }
      66% { border-radius: 60% 50% 40% 50% / 40% 50% 60% 50%; }
    }

    /* ===== AUTH PAGE ===== */
    .auth-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-32) var(--s-6) var(--s-20);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    /* ===== GLASS AUTH CARD ===== */
    .auth-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--s-10) var(--s-8);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.15), inset 0 1px 0 var(--glass-highlight);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--blue), var(--cyan));
      opacity: 0.6;
    }

    .auth-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      pointer-events: none;
      border-radius: inherit;
    }

    .auth-card:hover {
      box-shadow: 0 20px 60px rgba(196, 181, 255, 0.25), 0 8px 24px rgba(168, 216, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
    }

    /* ===== AUTH HEADER ===== */
    .auth-header {
      text-align: center;
      margin-bottom: var(--s-8);
      position: relative;
      z-index: 1;
    }

    .auth-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--ink);
      margin: 0 0 var(--s-3);
    }

    .auth-subtitle {
      font-size: 15px;
      font-weight: 400;
      color: var(--ink-secondary);
      line-height: 1.6;
    }

    /* ===== FORM INPUTS ===== */
    .form-group {
      margin-bottom: var(--s-5);
      position: relative;
      z-index: 1;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-secondary);
      margin-bottom: var(--s-2);
      letter-spacing: 0.02em;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 400;
      font-family: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      outline: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .form-input::placeholder {
      color: var(--ink-light);
    }

    .form-input:focus {
      border-color: var(--lavender);
      background: rgba(255, 255, 255, 0.45);
      box-shadow: 0 0 0 3px rgba(196, 181, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    /* Password field with toggle */
    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: var(--s-2);
      color: var(--ink-muted);
      transition: color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle:hover {
      color: var(--cobalt);
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
    }

    /* ===== JELLY CTA BUTTON ===== */
    .jelly-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-2);
      padding: 14px 28px;
      border-radius: var(--radius-full);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      border: none;
      font-family: inherit;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .jelly-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    .jelly-btn-primary {
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      color: var(--cobalt);
      box-shadow: 0 4px 20px rgba(196, 181, 255, 0.4), 0 2px 8px rgba(255, 184, 208, 0.3), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .jelly-btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(196, 181, 255, 0.5), 0 4px 16px rgba(255, 184, 208, 0.4), inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .jelly-btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    /* ===== DIVIDER ===== */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--s-4);
      margin: var(--s-6) 0;
      position: relative;
      z-index: 1;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-border), transparent);
    }

    .auth-divider span {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ===== SSO BUTTONS ===== */
    .sso-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--s-3);
      position: relative;
      z-index: 1;
    }

    .sso-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-3);
      padding: 12px 18px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.3);
      color: var(--ink-secondary);
      font-family: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
    }

    .sso-btn:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(168, 216, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.6);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .sso-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ===== AUTH LINKS ===== */
    .auth-links {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: var(--s-6);
      position: relative;
      z-index: 1;
    }

    .auth-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .auth-link:hover {
      color: var(--cobalt);
    }

    .auth-link-accent {
      color: var(--cobalt);
      font-weight: 600;
    }

    .auth-link-accent:hover {
      color: var(--lavender);
    }

    /* ===== FOOTER LINKS ===== */
    .auth-footer {
      text-align: center;
      margin-top: var(--s-8);
      position: relative;
      z-index: 1;
    }

    .auth-footer-text {
      font-size: 14px;
      color: var(--ink-muted);
    }

    .auth-footer-text a {
      color: var(--cobalt);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .auth-footer-text a:hover {
      color: var(--lavender);
    }

    /* ===== TRUST BADGE ===== */
    .trust-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-2);
      margin-top: var(--s-6);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-muted);
      position: relative;
      z-index: 1;
    }

    .trust-badge svg {
      width: 14px;
      height: 14px;
      color: #22c55e;
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      .aurora-orb,
      .blob-decoration,
      .logo-blob {
        animation: none;
      }
      .jelly-btn,
      .auth-card,
      .form-input,
      .sso-btn {
        transition: none;
      }
    }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      .auth-card {
        padding: var(--s-8) var(--s-5);
        border-radius: var(--radius-md);
      }
      .blob-1,
      .blob-2,
      .blob-3 {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Aurora Background -->
  <div class="aurora">
    <div class="aurora-orb aurora-orb-1"></div>
    <div class="aurora-orb aurora-orb-2"></div>
    <div class="aurora-orb aurora-orb-3"></div>
    <div class="aurora-orb aurora-orb-4"></div>
  </div>

  <!-- Blob Decorations -->
  <div class="blob-decoration blob-1"></div>
  <div class="blob-decoration blob-2"></div>
  <div class="blob-decoration blob-3"></div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="dreamcore-landing.html" class="logo">
        <div class="logo-blob"></div>
        AI Guardrail
      </a>
    </div>
  </nav>

  <!-- Auth Page -->
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle">Sign in to your AI Guardrail account</p>
        </div>

        <form action="#" method="POST">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="you@company.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Enter your password"
                required
                autocomplete="current-password"
              />
              <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="auth-links">
            <a href="dreamcore-forgot-password.html" class="auth-link">Forgot password?</a>
          </div>

          <button type="submit" class="jelly-btn jelly-btn-primary" style="margin-top: var(--s-6);">
            Sign In
          </button>
        </form>

        <div class="auth-divider">
          <span>Or</span>
        </div>

        <div class="sso-buttons">
          <button type="button" class="sso-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
          <button type="button" class="sso-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            Continue with GitHub
          </button>
        </div>

        <div class="auth-footer">
          <p class="auth-footer-text">
            Don't have an account? <a href="dreamcore-signup.html">Sign up</a>
          </p>
        </div>

        <div class="trust-badge">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          Encrypted & secure
        </div>
      </div>
    </div>
  </main>

  <script>
    // Password visibility toggle
    document.querySelector('.password-toggle').addEventListener('click', function() {
      const input = document.getElementById('password');
      const isPassword = input.type === 'password';
      input.type = isPassword ? 'text' : 'password';
      this.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
    });
  </script>
</body>
</html>
