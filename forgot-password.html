<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — AI Guardrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dreamcore pastel holographic palette */
      --pink: #ffb8d0;
      --pink-soft: rgba(255, 184, 208, 0.15);
      --blue: #a8d8ff;
      --blue-soft: rgba(168, 216, 255, 0.15);
      --lavender: #c4b5ff;
      --lavender-soft: rgba(196, 181, 255, 0.15);
      --cyan: #a0f0e8;
      --cyan-soft: rgba(160, 240, 232, 0.15);
      --peach: #ffd4b8;
      --yellow: #fff4a8;
      --cobalt: #2d3a8c;
      --cobalt-soft: rgba(45, 58, 140, 0.08);

      /* Surface materials */
      --glass-bg: rgba(255, 255, 255, 0.25);
      --glass-border: rgba(255, 255, 255, 0.4);
      --glass-highlight: rgba(255, 255, 255, 0.6);
      --jelly-bg: rgba(255, 184, 208, 0.2);
      --jelly-border: rgba(255, 184, 208, 0.35);

      /* Text */
      --ink: #1a1a3e;
      --ink-secondary: #4a4a6e;
      --ink-muted: #7a7a9e;
      --ink-light: #a0a0c0;

      /* Radii */
      --radius-sm: 20px;
      --radius-md: 28px;
      --radius-lg: 40px;
      --radius-full: 9999px;

      /* Space */
      --s-1: 4px;
      --s-2: 8px;
      --s-3: 12px;
      --s-4: 16px;
      --s-5: 20px;
      --s-6: 24px;
      --s-8: 32px;
      --s-10: 40px;
      --s-12: 48px;
      --s-16: 64px;
      --s-20: 80px;
      --s-24: 96px;
      --s-32: 128px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #f0f4ff 0%, #fff0f5 25%, #f5f0ff 50%, #e8f8f5 75%, #fff8f0 100%);
      background-attachment: fixed;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== AURORA BACKGROUND ===== */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .aurora-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .aurora-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--pink) 0%, transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }

    .aurora-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--blue) 0%, transparent 70%);
      top: 20%; right: -15%;
      animation-delay: -7s;
    }

    .aurora-orb-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, var(--lavender) 0%, transparent 70%);
      bottom: 10%; left: 20%;
      animation-delay: -14s;
    }

    .aurora-orb-4 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, var(--cyan) 0%, transparent 70%);
      bottom: -5%; right: 30%;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(40px, 10px) scale(1.02); }
    }

    /* ===== BLOB DECORATIONS ===== */
    .blob-decoration {
      position: fixed;
      z-index: 0;
      pointer-events: none;
      border-radius: 50%;
      animation: blob-bounce 3s ease-in-out infinite;
    }

    .blob-decoration::after {
      content: '';
      position: absolute;
      top: 15%; left: 20%;
      width: 25%; height: 15%;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      filter: blur(2px);
    }

    .blob-1 {
      width: 120px; height: 120px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--peach) 100%);
      box-shadow: 0 8px 32px rgba(255, 184, 208, 0.5), inset 0 -4px 12px rgba(255, 255, 255, 0.3);
      top: 15%; left: 8%;
      animation-delay: 0s;
    }

    .blob-2 {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.5), inset 0 -4px 12px rgba(255, 255, 255, 0.3);
      top: 60%; right: 10%;
      animation-delay: -1s;
    }

    .blob-3 {
      width: 100px; height: 100px;
      background: linear-gradient(135deg, var(--lavender) 0%, var(--pink) 100%);
      box-shadow: 0 8px 32px rgba(196, 181, 255, 0.5), inset 0 -4px 12px rgba(255, 255, 255, 0.3);
      bottom: 20%; left: 15%;
      animation-delay: -2s;
    }

    @keyframes blob-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    /* ===== GLASS NAV ===== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: var(--s-4) var(--s-6);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--s-3) var(--s-5);
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.15), inset 0 1px 0 var(--glass-highlight);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--s-3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .logo-blob {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      border-radius: 50% 40% 60% 50% / 60% 50% 40% 60%;
      position: relative;
      animation: blob-morph 8s ease-in-out infinite;
      box-shadow: 0 4px 16px rgba(196, 181, 255, 0.4), inset 0 -2px 8px rgba(255, 255, 255, 0.3);
    }

    @keyframes blob-morph {
      0%, 100% { border-radius: 50% 40% 60% 50% / 60% 50% 40% 60%; }
      33% { border-radius: 40% 60% 50% 60% / 50% 60% 50% 40%; }
      66% { border-radius: 60% 50% 40% 50% / 40% 50% 60% 50%; }
    }

    /* ===== JELLY BUTTON ===== */
    .jelly-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--s-2);
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      border: none;
      font-family: inherit;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    .jelly-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    .jelly-btn-primary {
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 50%, var(--blue) 100%);
      color: var(--cobalt);
      box-shadow: 0 4px 20px rgba(196, 181, 255, 0.4), 0 2px 8px rgba(255, 184, 208, 0.3), inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .jelly-btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 40px rgba(196, 181, 255, 0.5), 0 4px 16px rgba(255, 184, 208, 0.4), inset 0 1px 0 rgba(255,255,255,0.6);
    }

    .jelly-btn-primary:active {
      transform: translateY(-1px) scale(0.98);
    }

    /* ===== AUTH PAGE LAYOUT ===== */
    .auth-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-32) var(--s-6) var(--s-20);
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    /* ===== GLASSMORPHISM FORM CARD ===== */
    .auth-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: var(--s-10) var(--s-8);
      box-shadow: 0 8px 32px rgba(168, 216, 255, 0.15), inset 0 1px 0 var(--glass-highlight);
      position: relative;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--pink), var(--lavender), var(--blue), var(--cyan));
      opacity: 0.6;
    }

    .auth-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      pointer-events: none;
      border-radius: inherit;
    }

    .auth-card:hover {
      box-shadow: 0 20px 60px rgba(196, 181, 255, 0.25), 0 8px 24px rgba(168, 216, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
    }

    /* ===== AUTH HEADER ===== */
    .auth-header {
      text-align: center;
      margin-bottom: var(--s-8);
      position: relative;
      z-index: 1;
    }

    .auth-icon {
      width: 64px; height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--s-5);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-soft), var(--lavender-soft));
      box-shadow: 0 4px 16px rgba(196, 181, 255, 0.3);
      position: relative;
    }

    .auth-icon::after {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 20%; height: 12%;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      filter: blur(1px);
    }

    .auth-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin: 0 0 var(--s-3);
      color: var(--ink);
    }

    .auth-subtitle {
      font-size: 15px;
      color: var(--ink-secondary);
      line-height: 1.6;
      margin: 0;
    }

    /* ===== FORM ===== */
    .auth-form {
      position: relative;
      z-index: 1;
    }

    .form-group {
      margin-bottom: var(--s-6);
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-secondary);
      margin-bottom: var(--s-2);
      letter-spacing: 0.02em;
    }

    .form-input {
      width: 100%;
      padding: 14px 18px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      outline: none;
      transition: all 0.3s ease;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .form-input::placeholder {
      color: var(--ink-light);
    }

    .form-input:focus {
      border-color: var(--lavender);
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 0 0 3px rgba(196, 181, 255, 0.2), inset 0 1px 2px rgba(0, 0, 0, 0.04);
    }

    .form-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-hint {
      font-size: 13px;
      color: var(--ink-muted);
      margin-top: var(--s-2);
      line-height: 1.5;
    }

    /* ===== SUCCESS STATE ===== */
    .success-state {
      display: none;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .success-state.active {
      display: block;
      animation: fadeInUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success-icon {
      width: 72px; height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--s-5);
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan-soft), var(--blue-soft));
      box-shadow: 0 4px 20px rgba(160, 240, 232, 0.4);
      position: relative;
    }

    .success-icon::after {
      content: '';
      position: absolute;
      top: 18%; left: 22%;
      width: 20%; height: 12%;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      filter: blur(1px);
    }

    .success-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 var(--s-3);
      color: var(--ink);
    }

    .success-message {
      font-size: 15px;
      color: var(--ink-secondary);
      line-height: 1.6;
      margin: 0 0 var(--s-6);
    }

    .success-email {
      display: inline-block;
      padding: var(--s-2) var(--s-4);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      color: var(--cobalt);
      margin-bottom: var(--s-6);
      word-break: break-all;
    }

    /* ===== AUTH FOOTER ===== */
    .auth-footer {
      text-align: center;
      margin-top: var(--s-6);
      position: relative;
      z-index: 1;
    }

    .auth-footer-text {
      font-size: 14px;
      color: var(--ink-secondary);
    }

    .auth-footer-link {
      color: var(--cobalt);
      font-weight: 600;
      text-decoration: none;
      position: relative;
      transition: all 0.3s ease;
    }

    .auth-footer-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 2px;
      background: linear-gradient(90deg, var(--pink), var(--lavender));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .auth-footer-link:hover {
      color: var(--cobalt);
    }

    .auth-footer-link:hover::after {
      width: 100%;
    }

    /* ===== HIDDEN ===== */
    .hidden {
      display: none !important;
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      .aurora-orb,
      .blob-decoration,
      .logo-blob {
        animation: none;
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .auth-page {
        padding: var(--s-24) var(--s-4) var(--s-12);
      }
      .auth-card {
        padding: var(--s-8) var(--s-5);
      }
      .blob-1 { width: 80px; height: 80px; }
      .blob-2 { width: 60px; height: 60px; }
      .blob-3 { width: 70px; height: 70px; }
    }
  </style>
</head>
<body>
  <!-- Aurora Background -->
  <div class="aurora">
    <div class="aurora-orb aurora-orb-1"></div>
    <div class="aurora-orb aurora-orb-2"></div>
    <div class="aurora-orb aurora-orb-3"></div>
    <div class="aurora-orb aurora-orb-4"></div>
  </div>

  <!-- Blob Decorations -->
  <div class="blob-decoration blob-1"></div>
  <div class="blob-decoration blob-2"></div>
  <div class="blob-decoration blob-3"></div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <div class="logo-blob"></div>
        AI Guardrail
      </a>
    </div>
  </nav>

  <!-- Auth Page -->
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <!-- Form State -->
        <div id="form-state">
          <div class="auth-header">
            <div class="auth-icon">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--cobalt)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </div>
            <h1 class="auth-title">Forgot password?</h1>
            <p class="auth-subtitle">No worries. Enter your email and we'll send you a reset link.</p>
          </div>

          <form class="auth-form" id="forgot-form" onsubmit="handleSubmit(event)">
            <div class="form-group">
              <label class="form-label" for="email">Email address</label>
              <input
                class="form-input"
                id="email"
                name="email"
                type="email"
                placeholder="you@company.com"
                required
                autocomplete="email"
              />
              <p class="form-hint">We'll send a secure reset link to this address.</p>
            </div>

            <button type="submit" class="jelly-btn jelly-btn-primary" id="submit-btn">
              Send reset link
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14"/>
                <path d="m12 5 7 7-7 7"/>
              </svg>
            </button>
          </form>
        </div>

        <!-- Success State -->
        <div class="success-state" id="success-state">
          <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--cobalt)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>
          <h2 class="success-title">Check your inbox</h2>
          <p class="success-message">We've sent a password reset link to:</p>
          <div class="success-email" id="success-email"></div>
          <p class="success-message">Didn't receive it? Check your spam folder or <a href="#" class="auth-footer-link" onclick="resetForm(event)">try again</a>.</p>
        </div>
      </div>

      <div class="auth-footer">
        <p class="auth-footer-text">
          Remember your password?
          <a href="index.html" class="auth-footer-link">Sign in</a>
        </p>
      </div>
    </div>
  </main>

  <script>
    function handleSubmit(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const submitBtn = document.getElementById('submit-btn');
      const formState = document.getElementById('form-state');
      const successState = document.getElementById('success-state');
      const successEmail = document.getElementById('success-email');

      // Disable button and show loading state
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.7';
      submitBtn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;">
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        Sending...
      `;

      // Simulate API call
      setTimeout(() => {
        formState.classList.add('hidden');
        successEmail.textContent = email;
        successState.classList.add('active');
      }, 1500);
    }

    function resetForm(event) {
      event.preventDefault();
      const formState = document.getElementById('form-state');
      const successState = document.getElementById('success-state');
      const submitBtn = document.getElementById('submit-btn');
      const emailInput = document.getElementById('email');

      successState.classList.remove('active');
      formState.classList.remove('hidden');

      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
      submitBtn.innerHTML = `
        Send reset link
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/>
          <path d="m12 5 7 7-7 7"/>
        </svg>
      `;

      emailInput.value = '';
      emailInput.focus();
    }
  </script>

  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
